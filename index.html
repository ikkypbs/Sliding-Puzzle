<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Cam — Gesture Capture</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="app">

  <div id="stage">
    <video id="webcam" playsinline autoplay muted></video>
    <canvas id="sceneCanvas"></canvas>

    <div class="hud-top">
      <div class="brand">PUZZLE·CAM <small>hand-frame capture</small></div>
      <div class="status-pill">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">iniciando cámara…</span>
      </div>
    </div>

    <div id="progressBadge" class="progress-badge">
      <span id="progressText">0 / 9 piezas colocadas</span>
    </div>

    <div id="loadingOverlay">
      <div class="loader-text" id="loaderText">cargando modelo HandLandmarker…</div>
      <div class="loader-bar"></div>
      <button type="button" id="loaderRetry" class="loader-retry hidden">reintentar</button>
    </div>

    <div id="errorBanner"></div>
  </div>

  <aside id="gallery">
    <div class="gallery-head">
      <span class="gallery-title">Tira</span>
      <span class="gallery-count" id="galleryCount">0 / 3</span>
    </div>

    <div class="strip-complete-msg" id="stripCompleteMsg">
      tira completa — descarga o reinicia para seguir
    </div>

    <div id="galleryStrip" class="gallery-strip">
      <div class="gallery-empty" id="galleryEmpty">
        Tus rompecabezas completados<br/>aparecerán aquí.
      </div>
    </div>

    <div class="gallery-actions">
      <button type="button" id="downloadStripBtn" class="gallery-action-btn" disabled>descargar tira</button>
      <button type="button" id="resetAllBtn" class="gallery-action-btn gallery-action-btn--danger">reiniciar todo</button>
    </div>
  </aside>

</div>

<script type="module" src="./app.js"></script>
</body>
</html>
